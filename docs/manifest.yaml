version: 1

global:
  cors:
    enabled: true
    origin: "*"
  cache:
    enabled: false

services:
  - name: catalog-api
    prefix: /catalog
    discovery:
      mode: static
      target: http://catalog-svc:3000

    breaker:
      threshold: 10
      timeoutMs: 30000

    cache:
      enabled: true
      ttlSeconds: 60
      backend: memory

    routes:
      - path: /products
        methods: [GET]
        transformers:
          onResponse:
            - name: maskFields
              config:
                fields: ["internalNotes"]

      - path: /products/:id
        methods: [GET]
        transformers:
          onResponse:
            - name: scrubInternalFields

  - name: auth-api
    prefix: /auth
    discovery:
      mode: static
      target: http://auth-svc:3001

    routes:
      - path: /login
        methods: [POST]
        transformers:
          onRequest:
            - name: validateQuery
          onResponse:
            - name: addResponseEnvelope

  - name: inventory-api
    prefix: /inventory
    discovery:
      mode: dns
      serviceName: inventory-svc
      namespace: default
      port: 3002

    cache:
      enabled: false

    routes:
      - path: /stock/:sku
        methods: [GET]
        transformers:
          onResponse:
            - name: rewritePath
